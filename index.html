<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEPTUNE ROBOTIKS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scrollbar-width: none; overflow-x: hidden; }
  html::-webkit-scrollbar { display: none; }
  body {
    background: #000508;
    cursor: none;
    overflow: hidden;
  }
  canvas#gl {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }
  .scroll-spacer {
    position: relative;
    z-index: 0;
    pointer-events: none;
  }
  .cursor-ring {
    position: fixed;
    width: 18px; height: 18px;
    border: 1px solid rgba(140, 200, 255, 0.4);
    border-radius: 50%;
    pointer-events: none;
    z-index: 100;
    transform: translate(-50%, -50%);
    mix-blend-mode: difference;
  }
  .cursor-dot {
    position: fixed;
    width: 3px; height: 3px;
    background: rgba(140, 200, 255, 0.7);
    border-radius: 50%;
    pointer-events: none;
    z-index: 100;
    transform: translate(-50%, -50%);
  }
  .compass-tape {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  .compass-tape.visible { opacity: 1; }
  .compass-lubber {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    height: 90px;
    background: rgba(140, 200, 255, 0.6);
    z-index: 51;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  .compass-lubber.visible { opacity: 1; }
  /* mixer panel styles commented out for clean UI
  #mixerPanel { ... }
  */
  @media (max-width: 768px) {
    html, body {
      overflow: hidden;
      height: 100%;
      position: fixed;
      width: 100%;
      cursor: auto;
    }
    .cursor-ring, .cursor-dot { display: none; }
    .scroll-spacer { display: none; }
    .compass-tape { bottom: 16px; }
    .compass-lubber { bottom: 14px; }
  }
</style>
</head>
<body>

<div class="cursor-ring" id="cursorRing"></div>
<div class="cursor-dot" id="cursorDot"></div>

<canvas id="gl"></canvas>
<canvas id="compass" class="compass-tape" width="520" height="80"></canvas>
<div class="compass-lubber" id="lubber"></div>
<div class="scroll-spacer" id="spacer"></div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

const FILES = [
  "1053631275342527316.webp","1053631275342527320.webp","1053631275342527323.webp",
  "1053631275342527341.webp","1053631275342527346.webp","1053631275342527347.webp",
  "1053631275342527349.webp","1053631275342527382.webp","1053631275342527392.webp",
  "1053631275342527395.webp","1053631275342527400.webp","1053631275342527402.webp",
  "1053631275342527406.webp","1053631275342527413.webp","1053631275342527416.webp",
  "1053631275342527421.webp","1053631275342527423.webp","1053631275342527426.webp",
  "1053631275342527428.webp","1053631275342527429.webp","1053631275342527430.webp",
  "1053631275342527482.webp","1053631275342527492.webp","1053631275342527505.webp",
  "1053631275342527511.webp","1053631275342527518.webp","1053631275342527523.webp",
  "1053631275342527528.webp","1053631275342527530.webp","1053631275342527535.webp",
  "1053631275342527541.webp","1053631275342527547.webp","1053631275342527549.webp",
  "1053631275342527550.webp","1053631275342527556.webp","1053631275342527559.webp",
  "1053631275342527562.webp","1053631275342527567.webp","1053631275342527569.webp",
  "1053631275342527571.webp","1053631275342527574.webp","1053631275342527577.webp",
  "1053631275342527579.webp","1053631275342527580.webp","1053631275342527715.webp",
  "1053631275342527718.webp","1053631275342527737.webp","1053631275342527743.webp",
  "1053631275342527748.webp","1053631275342527755.webp","1053631275342527763.webp",
  "1053631275342527770.webp","1053631275342527777.webp","1053631275342527781.webp",
  "1053631275342527783.webp","1053631275342527784.webp","1053631275342527793.webp",
  "1053631275342527795.webp","1053631275342527797.webp","1053631275342527803.webp",
  "1053631275342527805.webp","1053631275342527810.webp","1053631275342527822.webp",
  "1053631275342527827.webp","1053631275342527835.webp","1053631275342527844.webp",
  "1053631275342527852.webp","1053631275342527856.webp","1053631275342527857.webp",
  "1053631275342527869.webp","1053631275342527873.webp","1053631275342527878.webp",
  "1053631275342527885.webp","1053631275342527890.webp","1053631275342527899.webp",
  "1053631275342527902.webp","1053631275343297380.webp"
];

const N = FILES.length;
window.scrollTo(0, 0);

// ─── Texture Management ───
const texLoader = new THREE.TextureLoader();
const imgCache = new Map();
const moshCache = new Map();
const placeholder = new THREE.DataTexture(new Uint8Array([3, 5, 15, 255]), 1, 1, THREE.RGBAFormat);
placeholder.needsUpdate = true;
const moshPlaceholder = new THREE.DataTexture(new Uint8Array([128, 128, 128, 255]), 1, 1, THREE.RGBAFormat);
moshPlaceholder.needsUpdate = true;

function loadTex(cache, dir, i, srgb) {
  const wi = ((i % N) + N) % N;
  if (cache.has(wi)) return cache.get(wi);
  const tex = texLoader.load(`${dir}/${FILES[wi]}`, (t) => {
    t.minFilter = THREE.LinearFilter;
    t.magFilter = THREE.LinearFilter;
    if (srgb) t.colorSpace = THREE.SRGBColorSpace;
  });
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  cache.set(wi, tex);
  return tex;
}

function getTexture(i) { return loadTex(imgCache, 'images', i, true); }
function getMosh(i) { return loadTex(moshCache, 'mosh', i, false); }

let preloadIdx = 0;
function preloadBatch() {
  const BATCH = 4;
  for (let b = 0; b < BATCH && preloadIdx < N; b++, preloadIdx++) {
    getTexture(preloadIdx);
    getMosh(preloadIdx);
  }
  if (preloadIdx < N) {
    if (typeof requestIdleCallback !== 'undefined') requestIdleCallback(preloadBatch);
    else setTimeout(preloadBatch, 50);
  }
}

function warmTexture(tex) {
  if (tex && tex.image && tex.image.complete) renderer.initTexture(tex);
}

let lastWarmedIdx = -1;
function warmNearby(center) {
  const wc = ((center % N) + N) % N;
  if (wc === lastWarmedIdx) return;
  lastWarmedIdx = wc;
  for (let d = 0; d <= 3; d++) {
    [wc + d, wc - d].forEach(k => {
      const wk = ((k % N) + N) % N;
      if (imgCache.has(wk)) warmTexture(imgCache.get(wk));
      if (moshCache.has(wk)) warmTexture(moshCache.get(wk));
    });
  }
}

// ─── Renderer ───
const canvas = document.getElementById('gl');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, alpha: false, powerPreference: 'high-performance' });
const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.0 : 1.5));
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

const vertexShader = `
  varying vec2 vUv;
  void main() {
    vUv = uv;
    gl_Position = vec4(position, 1.0);
  }
`;

const fragmentShader = `
  precision mediump float;
  
  uniform sampler2D uTex0;
  uniform sampler2D uTex1;
  uniform sampler2D uTex2;
  uniform sampler2D uMosh1;
  uniform float uBlend;
  uniform float uTime;
  uniform float uSpeed;
  uniform vec2 uResolution;
  uniform float uAspect0;
  uniform float uAspect1;
  uniform float uAspect2;

  // Parametrized controls
  uniform float uGrain;
  uniform float uSmear;
  uniform float uBleed;
  uniform float uHaze;
  uniform float uScanlines;
  uniform float uVignette;
  uniform float uSaturation;
  uniform float uContrast;
  uniform float uBrightness;
  uniform float uDissolveSoftness;
  uniform float uMoshInfluence;
  uniform float uDrift;
  uniform float uSpread;
  // Threshold FX
  uniform float uThreshold;
  uniform float uThresholdSoft;
  uniform float uPosterize;
  uniform float uSolarize;
  uniform float uHalftone;
  uniform float uInvert;
  uniform float uEdgeGlow;
  uniform float uPixelate;
  uniform float uColorShift;
  
  varying vec2 vUv;

  float hash(vec2 p) {
    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
  }
  float hash2(vec2 p) {
    return fract(sin(dot(p, vec2(269.5, 183.3))) * 43758.5453);
  }

  float vnoise(vec2 p) {
    vec2 i = floor(p);
    vec2 f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    return mix(
      mix(hash(i), hash(i + vec2(1.0, 0.0)), f.x),
      mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), f.x),
      f.y
    );
  }

  float fbm3(vec2 p) {
    return vnoise(p) * 0.55 + vnoise(p * 2.1) * 0.3 + vnoise(p * 4.3) * 0.15;
  }

  vec2 containUV(vec2 uv, float imgAspect, out float mask) {
    float screenAspect = uResolution.x / uResolution.y;
    float margin = 0.06;
    float usable = 1.0 - margin * 2.0;
    vec2 s = vec2(1.0);
    if (imgAspect > screenAspect) {
      s.x = usable;
      s.y = usable * (screenAspect / imgAspect);
    } else {
      s.y = usable;
      s.x = usable * (imgAspect / screenAspect);
    }
    vec2 mapped = (uv - 0.5) / s + 0.5;
    float ex = smoothstep(0.0, 0.03, mapped.x) * smoothstep(1.0, 0.97, mapped.x);
    float ey = smoothstep(0.0, 0.03, mapped.y) * smoothstep(1.0, 0.97, mapped.y);
    mask = ex * ey;
    return mapped;
  }

  void main() {
    vec2 uv = vUv;
    float t = uTime;
    float blend = uBlend;
    float speed = uSpeed;

    // Pixelate
    if (uPixelate > 0.0) {
      float cells = mix(512.0, 16.0, uPixelate);
      uv = floor(uv * cells) / cells;
    }

    vec2 pxUV = uv * uResolution;
    vec2 texel = 1.0 / uResolution;
    
    float mask0, mask1, mask2;
    vec2 uv0 = containUV(uv, uAspect0, mask0);
    vec2 uv1 = containUV(uv, uAspect1, mask1);
    vec2 uv2 = containUV(uv, uAspect2, mask2);
    
    vec3 prev = texture2D(uTex0, clamp(uv0, 0.0, 1.0)).rgb * mask0;
    vec3 curr = texture2D(uTex1, clamp(uv1, 0.0, 1.0)).rgb * mask1;
    vec3 next = texture2D(uTex2, clamp(uv2, 0.0, 1.0)).rgb * mask2;
    
    vec3 mosh1 = texture2D(uMosh1, clamp(uv1, 0.0, 1.0)).rgb;
    float edge1 = mosh1.b * mask1;
    float flowMag1 = length(mosh1.rg - 0.5) * mask1;
    
    float s1 = fbm3(uv * 6.0 + t * 0.08);
    float s2 = fbm3(uv * 10.0 - t * 0.06 + 80.0);
    float pg = hash(pxUV + t * 137.0);
    float pg2 = hash2(pxUV * 1.2 + t * 97.0);
    
    float dissolveMask = s1 * 0.45 + s2 * 0.3 + pg * 0.15 + pg2 * 0.1;
    float moshBias = ((1.0 - edge1) * 0.2 + flowMag1 * 0.15) * uMoshInfluence;

    float easedBlend = blend * blend * (3.0 - 2.0 * blend);
    float wideBlend = easedBlend * 1.4 - 0.2;
    float softness = uDissolveSoftness;
    float grainDissolve = 1.0 - smoothstep(
      wideBlend - softness + moshBias,
      wideBlend + softness + moshBias,
      dissolveMask
    );

    float grainStr = uGrain;
    float safeFade = smoothstep(0.0, 1.0, wideBlend);
    float fade = clamp(mix(safeFade, grainDissolve, grainStr), 0.0, 1.0);

    vec3 color = mix(curr, next, fade);

    float lumAtBoundary = dot(color, vec3(0.3, 0.6, 0.1));
    float structureContrast = smoothstep(0.2, 0.7, lumAtBoundary) * grainStr;
    color = mix(color, color * (1.0 + structureContrast * 0.3), grainStr);
    
    // Smear
    float lum0 = dot(color, vec3(0.3, 0.6, 0.1));
    float smearAmt = (smoothstep(0.4, 0.0, lum0) * 0.5 + 0.15) * uSmear;
    
    float drift = t * uDrift;
    vec2 driftV = vec2(sin(drift), cos(drift * 0.7)) * 0.5;
    float spread = uSpread;
    
    vec3 smear = curr * 0.35;
    smear += texture2D(uTex1, clamp(uv1 + (vec2( 1.0, 0.0) * spread + driftV) * texel, 0.0, 1.0)).rgb * 0.165;
    smear += texture2D(uTex1, clamp(uv1 + (vec2(-1.0, 0.0) * spread + driftV) * texel, 0.0, 1.0)).rgb * 0.165;
    smear += texture2D(uTex1, clamp(uv1 + (vec2(0.0,  1.0) * spread + driftV) * texel, 0.0, 1.0)).rgb * 0.16;
    smear += texture2D(uTex1, clamp(uv1 + (vec2(0.0, -1.0) * spread + driftV) * texel, 0.0, 1.0)).rgb * 0.16;
    smear *= mask1;
    smear *= vec3(0.92, 0.94, 1.06);
    
    color = mix(color, smear, smearAmt * 0.45);
    
    // Chromatic bleed
    float bleedStr = (0.02 + smearAmt * 0.015) * uBleed;
    vec2 bleedDir = vec2(vnoise(uv * 4.0 + t * 0.08) - 0.5, vnoise(uv * 4.0 + t * 0.08 + 77.0) - 0.5) * bleedStr;
    vec2 bleedDir2 = vec2(vnoise(uv * 6.0 - t * 0.06 + 33.0) - 0.5, vnoise(uv * 6.0 - t * 0.06 + 99.0) - 0.5) * bleedStr * 0.7;
    color.r = mix(color.r, texture2D(uTex1, clamp(uv1 + bleedDir, 0.0, 1.0)).r * mask1, 0.25);
    color.g = mix(color.g, texture2D(uTex1, clamp(uv1 + bleedDir2, 0.0, 1.0)).g * mask1, 0.1);
    color.b = mix(color.b, texture2D(uTex1, clamp(uv1 - bleedDir, 0.0, 1.0)).b * mask1, 0.25);
    
    // Haze
    float hazeN = fbm3(uv * 7.0 + t * 0.04 + 200.0);
    color += vec3(0.015, 0.025, 0.05) * hazeN * (0.5 + (1.0 - mask1) * 1.5) * uHaze;
    
    // Film grain
    float fineG = (pg * 0.5 + pg2 * 0.5) - 0.5;
    float structG = (vnoise(pxUV * 0.08 + floor(t * 3.0)) - 0.5) * 0.6;
    color += (fineG * 0.55 + structG * 0.45) * (0.09 + speed * 0.03) * uGrain;
    
    // Scanlines
    color -= sin(uv.y * uResolution.y * 1.5) * 0.01 * uScanlines;
    color += step(0.997, hash(vec2(floor(uv.y * uResolution.y * 0.5), floor(t * 5.0)))) * 0.02 * uScanlines;

    // --- THRESHOLD FX ---

    // Edge glow (Sobel-like)
    if (uEdgeGlow > 0.0) {
      float lumC = dot(color, vec3(0.3, 0.6, 0.1));
      float lumR = dot(texture2D(uTex1, clamp(uv1 + vec2(texel.x * 2.0, 0.0), 0.0, 1.0)).rgb, vec3(0.3, 0.6, 0.1)) * mask1;
      float lumU = dot(texture2D(uTex1, clamp(uv1 + vec2(0.0, texel.y * 2.0), 0.0, 1.0)).rgb, vec3(0.3, 0.6, 0.1)) * mask1;
      float edgeVal = abs(lumC - lumR) + abs(lumC - lumU);
      vec3 edgeColor = vec3(0.4, 0.7, 1.0) * edgeVal * 4.0;
      color += edgeColor * uEdgeGlow;
    }

    // Threshold (hard b&w cutoff)
    if (uThreshold > 0.0) {
      float lumT = dot(color, vec3(0.299, 0.587, 0.114));
      float cutoff = 0.5;
      float threshVal = uThresholdSoft > 0.0
        ? smoothstep(cutoff - uThresholdSoft, cutoff + uThresholdSoft, lumT)
        : step(cutoff, lumT);
      color = mix(color, vec3(threshVal), uThreshold);
    }

    // Posterize (reduce color levels)
    if (uPosterize > 0.0) {
      float levels = mix(32.0, 2.0, uPosterize);
      vec3 posterized = floor(color * levels + 0.5) / levels;
      color = mix(color, posterized, uPosterize);
    }

    // Solarize (invert above threshold)
    if (uSolarize > 0.0) {
      vec3 solarized = mix(color, 1.0 - color, step(0.5, color));
      color = mix(color, solarized, uSolarize);
    }

    // Halftone (dot pattern)
    if (uHalftone > 0.0) {
      float dotSize = mix(200.0, 20.0, uHalftone);
      vec2 htUV = floor(uv * dotSize) / dotSize;
      vec2 cellCenter = htUV + 0.5 / dotSize;
      float dist = length(uv - cellCenter) * dotSize;
      float lumH = dot(color, vec3(0.299, 0.587, 0.114));
      float dotMask = step(dist, lumH * 1.2);
      vec3 halftoned = color * dotMask;
      color = mix(color, halftoned, uHalftone);
    }

    // Color shift (hue rotation)
    if (uColorShift > 0.0) {
      float angle = uColorShift * 6.2832;
      float cosA = cos(angle);
      float sinA = sin(angle);
      mat3 hueRot = mat3(
        0.299 + 0.701*cosA + 0.168*sinA, 0.587 - 0.587*cosA + 0.330*sinA, 0.114 - 0.114*cosA - 0.497*sinA,
        0.299 - 0.299*cosA - 0.328*sinA, 0.587 + 0.413*cosA + 0.035*sinA, 0.114 - 0.114*cosA + 0.292*sinA,
        0.299 - 0.300*cosA + 1.250*sinA, 0.587 - 0.588*cosA - 1.050*sinA, 0.114 + 0.886*cosA - 0.203*sinA
      );
      color = hueRot * color;
    }

    // Invert
    color = mix(color, 1.0 - color, uInvert);

    // --- GLOBAL GRADE ---
    
    float lum = dot(color, vec3(0.299, 0.587, 0.114));
    color = mix(vec3(lum), color, uSaturation);
    color = (color - 0.5) * uContrast + 0.5;
    color += uBrightness - 1.0;
    color = pow(max(color, vec3(0.0)), vec3(1.02, 1.0, 0.95));
    color *= vec3(0.95, 0.97, 1.06);

    // Vignette
    float vig = 1.0 - smoothstep(0.35, 1.5, length((vUv - 0.5) * vec2(1.3, 1.0)));
    color *= mix(1.0 - uVignette * 0.5, 1.0, vig);

    gl_FragColor = vec4(clamp(color, 0.0, 1.0), 1.0);
  }
`;

// ─── Patch Parameters (mixable) ───
const PARAMS = {
  grain: 1,
  smear: 3,
  bleed: 1.71,
  haze: 1,
  scanlines: 1.43,
  vignette: 1.07,
  saturation: 0.55,
  contrast: 2.42,
  brightness: 1.23,
  dissolveSoftness: 0.25,
  moshInfluence: 1,
  drift: 0,
  spread: 4,
  threshold: 0,
  thresholdSoft: 0.24,
  posterize: 0.92,
  solarize: 0.82,
  halftone: 0,
  invert: 0.17,
  edgeGlow: 0,
  pixelate: 0,
  colorShift: 0.945,
};

const mat = new THREE.ShaderMaterial({
  uniforms: {
    uTex0: { value: placeholder },
    uTex1: { value: placeholder },
    uTex2: { value: placeholder },
    uMosh1: { value: moshPlaceholder },
    uBlend: { value: 0 },
    uTime: { value: 0 },
    uSpeed: { value: 0 },
    uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
    uAspect0: { value: 1 },
    uAspect1: { value: 1 },
    uAspect2: { value: 1 },
    uGrain: { value: PARAMS.grain },
    uSmear: { value: PARAMS.smear },
    uBleed: { value: PARAMS.bleed },
    uHaze: { value: PARAMS.haze },
    uScanlines: { value: PARAMS.scanlines },
    uVignette: { value: PARAMS.vignette },
    uSaturation: { value: PARAMS.saturation },
    uContrast: { value: PARAMS.contrast },
    uBrightness: { value: PARAMS.brightness },
    uDissolveSoftness: { value: PARAMS.dissolveSoftness },
    uMoshInfluence: { value: PARAMS.moshInfluence },
    uDrift: { value: PARAMS.drift },
    uSpread: { value: PARAMS.spread },
    uThreshold: { value: PARAMS.threshold },
    uThresholdSoft: { value: PARAMS.thresholdSoft },
    uPosterize: { value: PARAMS.posterize },
    uSolarize: { value: PARAMS.solarize },
    uHalftone: { value: PARAMS.halftone },
    uInvert: { value: PARAMS.invert },
    uEdgeGlow: { value: PARAMS.edgeGlow },
    uPixelate: { value: PARAMS.pixelate },
    uColorShift: { value: PARAMS.colorShift },
  },
  vertexShader,
  fragmentShader,
});

const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), mat);
scene.add(quad);

// ─── Physics (steering-wheel model) ───
let angle = 0;
let angularVel = 0;
const DRAG = 0.96;
const IDLE_VEL = 360 / (60 * 60);
const WHEEL_SENS = 0.0008;
const TOUCH_SENS = 0.004;
const MAX_VEL = 8;
let currentIdx = -1;

// ─── Input ───
let touchLastY = 0;

if (isMobile) {
  document.addEventListener('touchstart', (e) => {
    touchLastY = e.touches[0].clientY;
    angularVel *= 0.3;
  }, { passive: false });

  document.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const y = e.touches[0].clientY;
    angularVel += (touchLastY - y) * TOUCH_SENS;
    touchLastY = y;
  }, { passive: false });
} else {
  document.addEventListener('wheel', (e) => {
    e.preventDefault();
    angularVel += e.deltaY * WHEEL_SENS;
  }, { passive: false });
}

function getAspect(tex) {
  if (!tex || !tex.image) return 1;
  return tex.image.width / tex.image.height || 1;
}

function wrap(i) { return ((i % N) + N) % N; }

function updateTextures(idx, blend) {
  const t0 = getTexture(wrap(idx - 1));
  const t1 = getTexture(wrap(idx));
  const t2 = getTexture(wrap(idx + 1));

  mat.uniforms.uTex0.value = t0;
  mat.uniforms.uTex1.value = t1;
  mat.uniforms.uTex2.value = t2;
  mat.uniforms.uMosh1.value = getMosh(wrap(idx));
  mat.uniforms.uAspect0.value = getAspect(t0);
  mat.uniforms.uAspect1.value = getAspect(t1);
  mat.uniforms.uAspect2.value = getAspect(t2);
  mat.uniforms.uBlend.value = blend;
}

// ─── Compass Tape ───
const compassCanvas = document.getElementById('compass');
const compassCtx = compassCanvas.getContext('2d');
const lubber = document.getElementById('lubber');
const COMPASS_W = 520;
const COMPASS_H = 80;
const DEG_PER_PX = 0.5;
const CARDINALS = { 0: 'N', 90: 'E', 180: 'S', 270: 'W' };

let compassVisible = false;
let compassFadeTimer = null;
let lastDeg = -1;

function showCompass() {
  if (!compassVisible) {
    compassCanvas.classList.add('visible');
    lubber.classList.add('visible');
    compassVisible = true;
  }
  clearTimeout(compassFadeTimer);
  compassFadeTimer = setTimeout(() => {
    compassCanvas.classList.remove('visible');
    lubber.classList.remove('visible');
    compassVisible = false;
  }, 2000);
}

function drawCompass(deg) {
  if (Math.abs(deg - lastDeg) < 0.05) return;
  lastDeg = deg;
  showCompass();

  const dpr = Math.min(window.devicePixelRatio, 2);
  if (compassCanvas.width !== COMPASS_W * dpr) {
    compassCanvas.width = COMPASS_W * dpr;
    compassCanvas.height = COMPASS_H * dpr;
    compassCanvas.style.width = COMPASS_W + 'px';
    compassCanvas.style.height = COMPASS_H + 'px';
  }

  const ctx = compassCtx;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, COMPASS_W, COMPASS_H);

  const centerX = COMPASS_W / 2;
  const halfSpan = (COMPASS_W / 2) * DEG_PER_PX;
  const startDeg = deg - halfSpan;
  const endDeg = deg + halfSpan;

  for (let d = Math.floor(startDeg); d <= Math.ceil(endDeg); d++) {
    const normD = ((d % 360) + 360) % 360;
    const px = centerX + (d - deg) / DEG_PER_PX;
    if (px < -10 || px > COMPASS_W + 10) continue;

    const isCardinal = normD % 90 === 0;
    const is30 = normD % 30 === 0;
    const is10 = normD % 10 === 0;
    const is5 = normD % 5 === 0;

    if (!is5) continue;

    let h, alpha;
    if (isCardinal) { h = 44; alpha = 0.85; }
    else if (is30) { h = 30; alpha = 0.6; }
    else if (is10) { h = 18; alpha = 0.4; }
    else { h = 10; alpha = 0.25; }

    ctx.beginPath();
    ctx.moveTo(px, COMPASS_H);
    ctx.lineTo(px, COMPASS_H - h);
    ctx.strokeStyle = `rgba(140, 200, 255, ${alpha})`;
    ctx.lineWidth = isCardinal ? 2 : 1.2;
    ctx.stroke();

    if (isCardinal && CARDINALS[normD]) {
      ctx.font = '600 16px "SF Mono", "Fira Code", monospace';
      ctx.fillStyle = 'rgba(140, 200, 255, 0.9)';
      ctx.textAlign = 'center';
      ctx.fillText(CARDINALS[normD], px, COMPASS_H - h - 8);
    } else if (is30) {
      ctx.font = '500 12px "SF Mono", "Fira Code", monospace';
      ctx.fillStyle = 'rgba(140, 200, 255, 0.55)';
      ctx.textAlign = 'center';
      ctx.fillText(String(normD).padStart(3, '0'), px, COMPASS_H - h - 6);
    }
  }
}

// ─── Cursor ───
let mx = 0, my = 0, cx = 0, cy = 0;
const ring = document.getElementById('cursorRing');
const dot = document.getElementById('cursorDot');

document.addEventListener('mousemove', (e) => {
  mx = e.clientX; my = e.clientY;
  dot.style.left = mx + 'px';
  dot.style.top = my + 'px';
});

// ─── Animate ───
function animate() {
  requestAnimationFrame(animate);
  const t = performance.now() * 0.001;

  angularVel *= DRAG;
  angularVel = Math.max(-MAX_VEL, Math.min(MAX_VEL, angularVel));
  if (Math.abs(angularVel) < 0.001) angularVel = 0;
  angle += angularVel;

  const smoothSpeed = Math.min(1, Math.abs(angularVel) * 0.12);
  mat.uniforms.uSpeed.value += (smoothSpeed - mat.uniforms.uSpeed.value) * 0.08;

  const normAngle = ((angle % 360) + 360) % 360;
  const floatIdx = (normAngle / 360) * N;
  const idx = Math.floor(floatIdx) % N;
  const blend = floatIdx - Math.floor(floatIdx);

  if (idx !== currentIdx) {
    currentIdx = idx;
    warmNearby(idx);
  }

  updateTextures(idx, blend);
  mat.uniforms.uTime.value = t;

  drawCompass(normAngle);

  cx += (mx - cx) * 0.1;
  cy += (my - cy) * 0.1;
  ring.style.left = cx + 'px';
  ring.style.top = cy + 'px';

  renderer.render(scene, camera);
}

animate();
preloadBatch();

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  mat.uniforms.uResolution.value.set(w, h);
});

// ─── Sync PARAMS → uniforms ───
function syncUniforms() {
  mat.uniforms.uGrain.value = PARAMS.grain;
  mat.uniforms.uSmear.value = PARAMS.smear;
  mat.uniforms.uBleed.value = PARAMS.bleed;
  mat.uniforms.uHaze.value = PARAMS.haze;
  mat.uniforms.uScanlines.value = PARAMS.scanlines;
  mat.uniforms.uVignette.value = PARAMS.vignette;
  mat.uniforms.uSaturation.value = PARAMS.saturation;
  mat.uniforms.uContrast.value = PARAMS.contrast;
  mat.uniforms.uBrightness.value = PARAMS.brightness;
  mat.uniforms.uDissolveSoftness.value = PARAMS.dissolveSoftness;
  mat.uniforms.uMoshInfluence.value = PARAMS.moshInfluence;
  mat.uniforms.uDrift.value = PARAMS.drift;
  mat.uniforms.uSpread.value = PARAMS.spread;
  mat.uniforms.uThreshold.value = PARAMS.threshold;
  mat.uniforms.uThresholdSoft.value = PARAMS.thresholdSoft;
  mat.uniforms.uPosterize.value = PARAMS.posterize;
  mat.uniforms.uSolarize.value = PARAMS.solarize;
  mat.uniforms.uHalftone.value = PARAMS.halftone;
  mat.uniforms.uInvert.value = PARAMS.invert;
  mat.uniforms.uEdgeGlow.value = PARAMS.edgeGlow;
  mat.uniforms.uPixelate.value = PARAMS.pixelate;
  mat.uniforms.uColorShift.value = PARAMS.colorShift;
}

// ─── Preset System ───
const PRESET_LIST = [
  { name: "new default", params: { grain: 1, smear: 3, bleed: 1.71, haze: 1, scanlines: 1.43, vignette: 1.07, saturation: 0.55, contrast: 2.42, brightness: 1.23, dissolveSoftness: 0.25, moshInfluence: 1, drift: 0, spread: 4, threshold: 0, thresholdSoft: 0.24, posterize: 0.92, solarize: 0.82, halftone: 0, invert: 0.17, edgeGlow: 0, pixelate: 0, colorShift: 0.945 } },
  { name: "pearl", params: { grain: 1, smear: 0.41, bleed: 1.71, haze: 1, scanlines: 1.43, vignette: 1.07, saturation: 1.21, contrast: 1.33, brightness: 1, dissolveSoftness: 0.25, moshInfluence: 1, drift: 0, spread: 4, threshold: 0.39, thresholdSoft: 0.345, posterize: 0.81, solarize: 0.8, halftone: 0, invert: 1, edgeGlow: 0.18, pixelate: 0, colorShift: 0.96 } },
  { name: "sweet", params: { grain: 1, smear: 0.41, bleed: 1.71, haze: 1, scanlines: 1, vignette: 1, saturation: 1.21, contrast: 1.33, brightness: 1, dissolveSoftness: 0.25, moshInfluence: 1, drift: 0, spread: 4, threshold: 0.06, thresholdSoft: 0.1, posterize: 0.76, solarize: 0.51, halftone: 0, invert: 0, edgeGlow: 0.48, pixelate: 0, colorShift: 0 } },
  { name: "sweet2", params: { grain: 0, smear: 2.18, bleed: 3.64, haze: 0, scanlines: 2.5, vignette: 1.11, saturation: 1.16, contrast: 1.23, brightness: 1, dissolveSoftness: 0.45, moshInfluence: 1.94, drift: 1.29, spread: 13.1, threshold: 0.62, thresholdSoft: 0.305, posterize: 0.25, solarize: 0.45, halftone: 0.25, invert: 0.04, edgeGlow: 2, pixelate: 0, colorShift: 0 } },
];

let presetIdx = 0;

function applyPreset(idx) {
  presetIdx = idx % PRESET_LIST.length;
  Object.assign(PARAMS, PRESET_LIST[presetIdx].params);
  syncUniforms();
}

// Double-tap to cycle presets (won't interfere with scroll)
let lastTapTime = 0;
const DOUBLE_TAP_MS = 350;

function handleDoubleTap() {
  const now = performance.now();
  if (now - lastTapTime < DOUBLE_TAP_MS) {
    applyPreset(presetIdx + 1);
    lastTapTime = 0;
  } else {
    lastTapTime = now;
  }
}

document.addEventListener('click', handleDoubleTap);
